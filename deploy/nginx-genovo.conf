# Nginx — GêNovo
# IMPORTANTE: a porta abaixo deve ser igual a SERVER_PORT em backend/.env
# 1) Ajuste server_name para o seu domínio
# 2) sudo cp deploy/nginx-genovo.conf /etc/nginx/sites-available/genovo
# 3) sudo ln -sf /etc/nginx/sites-available/genovo /etc/nginx/sites-enabled/genovo
# 4) sudo nginx -t && sudo systemctl reload nginx
#
# Não sirva frontend/dist diretamente — todo tráfego (incl. /api/*) vai para o Node.

upstream genovo_backend {
    server 127.0.0.1:3031;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name genovo.example.com;

    client_max_body_size 10M;

    access_log /var/log/nginx/genovo-access.log;
    error_log  /var/log/nginx/genovo-error.log;

    location / {
        proxy_pass http://genovo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
