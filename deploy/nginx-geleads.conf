# Nginx — GêLeads
# 1) Ajuste server_name para o seu domínio
# 2) sudo cp deploy/nginx-geleads.conf /etc/nginx/sites-available/geleads
# 3) sudo ln -sf /etc/nginx/sites-available/geleads /etc/nginx/sites-enabled/geleads
# 4) sudo nginx -t && sudo systemctl reload nginx
# 5) SSL: sudo certbot --nginx -d geleads.seudominio.com.br

upstream geleads_backend {
    server 127.0.0.1:3031;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name geleads.genesisapps.com.br;

    client_max_body_size 10M;

    # Logs (opcional)
    access_log /var/log/nginx/geleads-access.log;
    error_log  /var/log/nginx/geleads-error.log;

    location / {
        proxy_pass http://geleads_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
